<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>departure — mobile</title>
  <style>
    :root {
      --color-warm: #ffb15a;
      --color-warm-dim: rgba(255, 177, 90, 0.6);
      --color-cool: #6fd0ff;
      --color-cool-dim: rgba(111, 208, 255, 0.6);
      --bg: #020309;
      --error: #ff5a5a;
      --font-mono: system-ui, -apple-system, BlinkMacSystemFont, "Space Mono", Menlo, monospace;
      --font-serif: "IM Fell English", "Times New Roman", serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--color-warm);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 480px;
      max-height: 100vh;
      max-height: 100dvh;
      min-height: 0;
      background: #000;
      color: var(--color-warm);
      overflow: hidden;
    }

    /* HUD 边框 */
    .hud-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(255, 255, 255, 0.16);
      z-index: 10;
    }
    .hud-tl {
      top: 10px;
      left: 10px;
      border-top: 1px solid currentColor;
      border-left: 1px solid currentColor;
    }
    .hud-tr {
      top: 10px;
      right: 10px;
      border-top: 1px solid currentColor;
      border-right: 1px solid currentColor;
    }
    .hud-bl {
      bottom: max(26px, var(--safe-bottom));
      left: max(10px, var(--safe-left));
      border-bottom: 1px solid currentColor;
      border-left: 1px solid currentColor;
    }
    .hud-br {
      bottom: max(26px, var(--safe-bottom));
      right: max(10px, var(--safe-right));
      border-bottom: 1px solid currentColor;
      border-right: 1px solid currentColor;
    }

    .noise-overlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.2) 0, transparent 40%),
        radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.07) 0, transparent 45%),
        radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.12) 0, transparent 35%);
      mix-blend-mode: screen;
      animation: noiseShift 6s linear infinite alternate;
    }

    @keyframes noiseShift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-10px, 10px, 0); }
    }

    @keyframes scanlines {
      0%   { background-position-y: 0; }
      100% { background-position-y: 6px; }
    }

    .scanlines {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.4) 50%,
        rgba(0, 0, 0, 0) 50%
      );
      background-size: 100% 4px;
      opacity: 0;
      mix-blend-mode: multiply;
      animation: scanlines 0.35s linear infinite;
    }

    .app.phase-2 .scanlines,
    .app.phase-3-camera .scanlines {
      opacity: 0.28;
    }

    /* Phase 3 相机：2001「星门/眼球」式假彩色氛围（替代纯黑留白） */
    @keyframes stargateEyeAppBg {
      0% { background-position: 0% 40%; }
      100% { background-position: 100% 60%; }
    }

    @keyframes cameraChromaDrift {
      0% { opacity: 0.74; transform: scale(1); }
      100% { opacity: 0.9; transform: scale(1.03); }
    }

    .app.phase-3-camera {
      background: linear-gradient(
        125deg,
        #060210 0%,
        #1a0530 14%,
        #0a1628 28%,
        #240818 42%,
        #022830 58%,
        #200828 72%,
        #08031a 86%,
        #060210 100%
      );
      background-size: 450% 450%;
      animation: stargateEyeAppBg 22s ease-in-out infinite alternate;
    }

    .app.phase-3-camera .center-console {
      background:
        radial-gradient(ellipse 130% 90% at 48% 42%, rgba(220, 0, 180, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 80% 70% at 72% 58%, rgba(0, 240, 230, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 18% 65%, rgba(120, 0, 200, 0.18) 0%, transparent 48%),
        transparent;
    }

    /* 相机全屏：隐藏上方文字区，避免与 .camera-view 对半分高只剩底部取景框 */
    .app.phase-3-camera .text-console {
      display: none;
    }

    /* 相机关闭后终端复出：垂直居中「相机已关闭 / LOST / 电力分配」段 */
    .app.phase-3-camera.post-camera-outro .text-console {
      display: flex;
    }

    .app.post-camera-outro #textLines {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      padding: 8px 6px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .app.post-camera-outro #textLines > .text-line {
      width: 100%;
      max-width: min(28em, 100%);
      text-align: center;
    }

    .app.post-camera-outro #textLines > .lost-record-box {
      width: 100%;
      max-width: min(28em, 100%);
      box-sizing: border-box;
    }

    .app.phase-3-camera .camera-view {
      flex: 1 1 0%;
      min-height: 0;
      width: 100%;
      align-items: stretch;
      background:
        radial-gradient(ellipse 100% 70% at 50% 0%, rgba(255, 0, 210, 0.2) 0%, transparent 45%),
        radial-gradient(ellipse 90% 60% at 50% 100%, rgba(0, 255, 245, 0.12) 0%, transparent 50%);
    }

    .app.phase-3-camera .camera-inner {
      flex: 1 1 0%;
      min-height: 0;
      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      aspect-ratio: auto;
      /* 覆盖通栏 .camera-inner 的 max-height / 9:16 限制，铺满中间栏 */
      background: linear-gradient(160deg, #12021c 0%, #030814 45%, #050218 100%);
      box-shadow:
        0 0 0 1px rgba(255, 80, 200, 0.35),
        0 0 28px rgba(0, 220, 255, 0.12),
        0 14px 32px rgba(0, 0, 0, 0.85);
    }

    .app.phase-3-camera .camera-inner > video {
      position: absolute;
      z-index: 0;
      opacity: 0;
    }

    .app.phase-3-camera .camera-inner::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 38% 46%, rgba(255, 0, 200, 0.5) 0%, transparent 45%),
        radial-gradient(circle at 64% 50%, rgba(0, 255, 240, 0.4) 0%, transparent 42%),
        linear-gradient(110deg, rgba(160, 0, 140, 0.35) 0%, rgba(0, 60, 90, 0.25) 100%);
      mix-blend-mode: hard-light;
      animation: cameraChromaDrift 7s ease-in-out infinite alternate;
    }

    .app.phase-3-camera .camera-overlay {
      z-index: 2;
    }

    .app.phase-3-camera .camera-frame-corner {
      border-color: rgba(255, 100, 220, 0.75);
      filter: drop-shadow(0 0 6px rgba(0, 255, 240, 0.35));
    }

    .app.phase-3-camera .camera-crosshair::before,
    .app.phase-3-camera .camera-crosshair::after {
      background: rgba(255, 120, 255, 0.85);
      box-shadow: 0 0 8px rgba(0, 255, 240, 0.4);
    }

    .app.phase-3-camera .camera-hud {
      color: rgba(220, 200, 255, 0.9);
    }

    .app.phase-3-camera .camera-vignette {
      background: radial-gradient(
        circle at 50% 50%,
        transparent 0,
        transparent 38%,
        rgba(80, 0, 90, 0.55) 72%,
        rgba(10, 0, 35, 0.92) 100%
      );
    }

    .app.phase-3-camera .camera-static {
      background-image:
        repeating-conic-gradient(
          from 0deg,
          rgba(255, 0, 200, 0.12) 0 0.5deg,
          rgba(0, 255, 240, 0.08) 0.5deg 1deg
        );
      mix-blend-mode: soft-light;
    }

    .app.phase-3-camera .camera-intensity-1 video {
      filter: grayscale(1) contrast(1.95) brightness(0.9) saturate(0);
    }

    .app.phase-3-camera .camera-intensity-2 video {
      filter: grayscale(1) contrast(2.15) brightness(0.86) saturate(0);
      image-rendering: pixelated;
    }

    .app.phase-3-camera .camera-intensity-3 video {
      filter: grayscale(1) contrast(2.35) brightness(0.82) saturate(0);
      image-rendering: pixelated;
    }

    .app.phase-4 .scanlines {
      opacity: 0.2;
    }

    .content {
      position: absolute;
      inset: 0;
      padding:
        max(16px, var(--safe-top))
        max(14px, var(--safe-right))
        max(22px, calc(12px + var(--safe-bottom)))
        max(14px, var(--safe-left));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-warm-dim);
    }

    .phase-label {
      min-width: auto;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 80px;
      justify-content: flex-end;
    }

    .signal-bars {
      display: flex;
      gap: 1px;
      height: 8px;
      align-items: flex-end;
    }

    .signal-bar {
      width: 3px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.3s, height 0.3s;
    }

    .signal-bar.active {
      background: var(--color-warm);
    }

    .signal-label {
      opacity: 0.7;
    }

    .timer {
      font-size: 11px;
      opacity: 0.65;
      text-align: right;
    }

    .middle {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .telemetry {
      font-size: 13px;
      color: var(--color-warm);
      margin-bottom: 6px;
      min-height: 80px;
      flex-shrink: 0;
    }

    .telemetry-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 2px;
      letter-spacing: 0.06em;
    }

    .telemetry-label {
      min-width: 42px;
    }

    .telemetry-value {
      text-align: right;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .telemetry-muted {
      color: rgba(255, 255, 255, 0.26);
    }

    .telemetry-error {
      color: var(--error);
    }

    .telemetry-warning {
      color: rgba(255, 176, 96, 0.98);
      animation: batteryBlink 0.95s steps(1) infinite;
    }

    .telemetry-critical {
      color: rgba(255, 105, 92, 0.98);
      text-shadow: 0 0 10px rgba(255, 90, 90, 0.42);
      animation: batteryBlinkFast 0.42s steps(1) infinite;
    }

    @keyframes batteryBlink {
      0%, 52% { opacity: 1; }
      53%, 100% { opacity: 0.45; }
    }

    @keyframes batteryBlinkFast {
      0%, 40% { opacity: 1; }
      41%, 100% { opacity: 0.28; }
    }

    .callsign {
      margin-top: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .center-console {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      position: relative;
      overflow: hidden;
    }

    .text-console {
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      min-height: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      border-radius: 6px;
      padding: 10px 10px 8px;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.85));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
      font-size: 13px;
      line-height: 1.4;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      color: var(--color-warm);
    }

    /* 遥测下方文案区：占满中间滚动容器高度，便于 P1/P2 把卫星提示顶到底部 */
    #textLines {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }

    /* P0：开场终端四行 + 命名区在控制台内水平、垂直居中 */
    .app.phase-0 #textLines {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      padding: 8px 6px;
    }

    .app.phase-0 #textLines > .text-line {
      width: 100%;
      max-width: min(22em, 100%);
      text-align: center;
    }

    .app.phase-0 #textLines > .input-row {
      margin-top: 14px;
      width: 100%;
      max-width: min(340px, 100%);
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 10px;
    }

    /* P1/P2：人格框在文案区下沿，与摇杆之间留出距离，不贴太紧 */
    .app.phase-1 #textLines,
    .app.phase-2 #textLines {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      text-align: left;
      box-sizing: border-box;
      padding-bottom: 14px;
    }

    .app.phase-1 .joystick-wrapper,
    .app.phase-2 .joystick-wrapper {
      margin-top: 18px;
    }

    .text-line {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      background: var(--color-warm);
      margin-left: 1px;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .input-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .input-label {
      opacity: 0.8;
      white-space: nowrap;
    }

    .name-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      color: var(--color-warm);
      padding: 4px 2px 3px;
      font-family: var(--font-mono);
      font-size: 14px;
    }

    .name-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .button {
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      color: var(--color-warm);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.1s;
    }

    .button:active {
      transform: scale(0.97);
      background: rgba(255, 255, 255, 0.05);
    }

    .button-ghost {
      border-radius: 3px;
      padding: 4px 10px;
    }

    /* 摇杆区：底部留白；圆形摇杆用固定宽高变量，避免小屏 flex 挤压成椭圆 */
    .joystick-wrapper {
      flex: 0 0 auto;
      flex-shrink: 0;
      width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-bottom: max(10px, var(--safe-bottom));
      margin-top: 4px;
      pointer-events: none;
      position: relative;
      z-index: 2;
    }

    .joystick-hint {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 210, 150, 0.9);
      text-shadow: 0 0 12px rgba(255, 177, 90, 0.5);
      opacity: 0.9;
      margin-bottom: 8px;
      padding: 0 8px;
      text-align: center;
      max-width: 100%;
      word-break: break-word;
    }

    .app.phase-2 .joystick-hint {
      color: rgba(200, 230, 255, 0.88);
      text-shadow: 0 0 12px rgba(111, 208, 255, 0.35);
    }

    .joystick {
      position: relative;
      box-sizing: border-box;
      flex-shrink: 0;
      /* 宽高同一表达式 → 任意视口下保持正圆，不因剩余高度被纵向压扁 */
      --joystick-size: min(
        260px,
        calc(100% - 24px),
        calc(100vw - 48px),
        calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 240px)
      );
      width: var(--joystick-size);
      height: var(--joystick-size);
      max-width: calc(100% - 24px);
      max-height: var(--joystick-size);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #3f3f3f 0, #0c0c0c 50%, #000 100%);
      box-shadow:
        0 0 0 1px rgba(255, 220, 170, 0.18),
        0 0 32px rgba(255, 177, 90, 0.24),
        0 24px 46px rgba(0, 0, 0, 0.88);
      overflow: hidden;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .joystick-circle {
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 1px solid rgba(255, 230, 200, 0.28);
    }

    .joystick-circle:nth-child(2) {
      inset: 25%;
      border-style: dashed;
      border-color: rgba(255, 220, 170, 0.24);
    }

    .joystick-circle:nth-child(3) {
      inset: 36%;
      border-style: dotted;
      border-color: rgba(255, 220, 170, 0.2);
    }

    .joystick-cross {
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      width: 40%;
      height: 40%;
      pointer-events: none;
    }

    .joystick-cross::before,
    .joystick-cross::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 220, 170, 0.26);
    }

    .joystick-cross::before {
      width: 1px;
      height: 100%;
    }

    .joystick-cross::after {
      height: 1px;
      width: 100%;
    }

    .joystick-compass-mark {
      position: absolute;
      width: 2px;
      height: 7px;
      background: rgba(255, 220, 170, 0.6);
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
    }

    .joystick-compass-mark.e {
      top: 50%;
      right: 6%;
      left: auto;
      transform: translateY(-50%) rotate(90deg);
    }

    .joystick-compass-mark.s {
      bottom: 6%;
      top: auto;
      left: 50%;
      transform: translateX(-50%) rotate(180deg);
    }

    .joystick-compass-mark.w {
      top: 50%;
      left: 6%;
      transform: translateY(-50%) rotate(270deg);
    }

    .joystick-touch {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255, 236, 210, 0.85);
      box-shadow: 0 0 18px rgba(255, 177, 90, 0.95);
      background: radial-gradient(circle, rgba(255, 194, 120, 0.95), rgba(255, 177, 90, 0.2) 60%, transparent);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease-out;
    }

    .joystick-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 2px;
      transform-origin: 0 50%;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.0), rgba(255, 194, 120, 0.96));
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(255, 194, 120, 0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease-out;
    }

    .joystick-active .joystick-touch,
    .joystick-active .joystick-line {
      opacity: 1;
    }

    /* 进度条 */
    .bottom {
      position: relative;
      height: 18px;
      margin-top: 4px;
    }

    .progress-track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 4px;
      height: 1px;
      background: rgba(255, 255, 255, 0.16);
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: linear-gradient(to right, rgba(255, 177, 90, 0.4), rgba(255, 177, 90, 0.9));
      transition: width linear;
    }

    .app.phase-2 .progress-bar,
    .app.phase-3 .progress-bar,
    .app.phase-3-camera .progress-bar,
    .app.phase-4 .progress-bar {
      background: linear-gradient(to right, rgba(111, 208, 255, 0.4), rgba(111, 208, 255, 0.9));
    }

    .progress-glitch {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(111, 208, 255, 0.8), rgba(111, 208, 255, 0));
      mix-blend-mode: screen;
      opacity: 0;
      pointer-events: none;
    }

    .progress-glitch.active {
      opacity: 1;
      animation: progressGlitch 0.3s ease-out;
    }

    @keyframes progressGlitch {
      0% { transform: translateX(0); opacity: 0.9; }
      100% { transform: translateX(-18px); opacity: 0; }
    }

    /* Phase 专用样式 */
    .app.phase-0 .top-bar,
    .app.phase-0 .bottom {
      opacity: 0;
      pointer-events: none;
    }

    .countdown {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 5;
      width: 100%;
      max-width: 100%;
      padding: 0 12px;
      box-sizing: border-box;
      font-size: clamp(28px, 12vmin, 42px);
      letter-spacing: 0.2em;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    .countdown.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    .flash.active {
      opacity: 1;
      animation: flashOut 0.4s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Phase 3 相机 */
    .camera-view {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 0 2px;
    }

    .camera-inner {
      position: relative;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 9 / 16;
      max-height: min(58dvh, calc(100dvh - 220px), 100%);
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.25),
        0 14px 32px rgba(0, 0, 0, 0.9);
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(0.9) contrast(1.6) saturate(0.7) hue-rotate(170deg) brightness(0.9);
      transform: scale(1.08);
    }

    #cameraRenderCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .camera-frame-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(180, 220, 255, 0.9);
    }

    .camera-frame-corner.tl {
      top: 6px;
      left: 6px;
      border-top: 2px solid currentColor;
      border-left: 2px solid currentColor;
    }

    .camera-frame-corner.tr {
      top: 6px;
      right: 6px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
    }

    .camera-frame-corner.bl {
      bottom: 6px;
      left: 6px;
      border-bottom: 2px solid currentColor;
      border-left: 2px solid currentColor;
    }

    .camera-frame-corner.br {
      bottom: 6px;
      right: 6px;
      border-bottom: 2px solid currentColor;
      border-right: 2px solid currentColor;
    }

    .camera-crosshair {
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      width: 14%;
      height: 14%;
    }

    .camera-crosshair::before,
    .camera-crosshair::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(200, 230, 255, 0.9);
    }

    .camera-crosshair::before {
      width: 1px;
      height: 100%;
    }

    .camera-crosshair::after {
      width: 100%;
      height: 1px;
    }

    .camera-hud {
      position: absolute;
      inset: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(200, 230, 255, 0.88);
    }

    .camera-hud-top,
    .camera-hud-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .camera-rec {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .camera-rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff3b3b;
      box-shadow: 0 0 10px rgba(255, 59, 59, 0.9);
      animation: recBlink 0.8s steps(1) infinite;
    }

    @keyframes recBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.1; }
    }

    .camera-static {
      position: absolute;
      inset: 0;
      opacity: 0.2;
      background-image:
        repeating-conic-gradient(
          from 0deg,
          rgba(255, 255, 255, 0.1) 0 0.5deg,
          rgba(0, 0, 0, 0.0) 0.5deg 1deg
        );
      mix-blend-mode: screen;
      animation: cameraNoise 0.8s steps(2) infinite;
    }

    @keyframes cameraNoise {
      0% { transform: translate3d(0, 0, 0) scale(1.02); opacity: 0.25; }
      50% { transform: translate3d(-4px, 2px, 0) scale(1.04); opacity: 0.55; }
      100% { transform: translate3d(4px, -2px, 0) scale(1.02); opacity: 0.25; }
    }

    .camera-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 0, transparent 46%, rgba(0, 0, 0, 0.7) 80%);
      pointer-events: none;
    }

    .camera-intensity-1 video {
      filter: grayscale(0.8) contrast(1.5) saturate(0.6) hue-rotate(160deg) brightness(0.9);
    }

    .camera-intensity-2 video {
      filter: grayscale(0.9) contrast(1.7) saturate(0.5) hue-rotate(165deg) brightness(0.85);
      image-rendering: pixelated;
    }

    .camera-intensity-3 video {
      filter: grayscale(1) contrast(2) saturate(0.35) hue-rotate(175deg) brightness(0.8);
      image-rendering: pixelated;
      transform: scale(1.12);
    }

    .camera-static.level-2 {
      opacity: 0.45;
    }

    .camera-static.level-3 {
      opacity: 0.8;
    }

    /* Phase 4 文本：顶栏 + 可滚动长文 + 底栏按钮，不挤出视区 */
    .phase4-text {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(140, 170, 200, 0.35);
      opacity: 0;
      transition: opacity 0.8s ease;
      width: 100%;
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .app.phase-4 .phase4-text {
      position: absolute;
      inset: 0;
      z-index: 4;
      max-height: 100%;
      overflow: hidden;
      padding: 8px 8px 0;
      /* 黑底 HUD 终端感，与主控制台统一 */
      background: radial-gradient(circle at 50% 0%, rgba(100, 160, 255, 0.06), rgba(0, 0, 0, 0.9));
      box-shadow: 0 0 0 1px rgba(200, 230, 255, 0.06) inset, 0 0 0 1px rgba(0, 0, 0, 0.45);
      border-radius: 6px;
    }

    .phase4-header {
      flex-shrink: 0;
      width: 100%;
      max-width: min(560px, 100%);
      text-align: center;
      box-sizing: border-box;
    }

    .phase4-text span.status {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      flex-shrink: 0;
    }

    #phase4VoyagerLabel {
      flex-shrink: 0;
    }

    .phase4-narrative {
      margin-top: 10px;
      width: 100%;
      max-width: min(560px, 100%);
      flex: 1 1 0%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      text-align: left;
      line-height: 1.55;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(185, 206, 232, 0.78);
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: anywhere;
      padding: 0 2px 10px 4px;
      /* 右侧留出滚动/手势空间 */
    }

    .phase4-narrative .key-line {
      margin-top: 10px;
      color: rgba(235, 198, 170, 0.92);
      font-weight: 600;
    }

    .phase4-restart {
      margin-top: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: min(560px, 100%);
      padding: 10px 8px max(10px, var(--safe-bottom));
      box-sizing: border-box;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.55) 32%, rgba(0, 0, 0, 0.72) 100%);
      box-shadow: 0 -1px 0 rgba(200, 230, 255, 0.05);
    }

    .phase4-restart .prompt {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(190, 210, 235, 0.62);
    }

    /* 文案文字 */
    .story-line {
      font-family: var(--font-serif);
      font-size: 13px;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.78);
    }

    .center-message {
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
    }

    .center-message-small {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.7;
    }

    .satellite-dialog {
      flex-shrink: 1;
      align-self: stretch;
      width: 100%;
      max-width: 100%;
      margin-top: 6px;
      margin-bottom: 2px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 190, 120, 0.22);
      background: linear-gradient(180deg, rgba(255, 170, 90, 0.07), rgba(0, 0, 0, 0.08));
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      max-height: min(280px, 48dvh);
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .satellite-dialog-body {
      font-size: clamp(13px, 3.5vw, 14px);
      line-height: 1.65;
      color: rgba(255, 210, 155, 0.94);
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 小黑 + 对话框作为一组垂直居中；仍保留 overflow-y 供小屏滚动 */
      justify-content: center;
      pointer-events: auto;
      background: rgba(3, 6, 14, 0.46);
      padding: max(6px, var(--safe-top)) max(8px, var(--safe-right)) max(8px, var(--safe-bottom)) max(8px, var(--safe-left));
      box-sizing: border-box;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* 蒙层在 .center-console 内且父级 overflow:hidden，不能用 88dvh 撑高——会裁掉底部按钮；以父级高度为上限 */
    .intro-dialog {
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      width: 100%;
      max-width: min(520px, 100%);
      max-height: min(
        100%,
        calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 24px)
      );
      min-height: 0;
      flex-shrink: 1;
      padding: 16px 12px 12px 12px;
      border: 1px solid rgba(180, 220, 255, 0.28);
      background: linear-gradient(180deg, rgba(8, 14, 26, 0.9), rgba(5, 10, 20, 0.88));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset, 0 22px 48px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 10% 警告 / P2 低电量：略加宽，主文滚动、确认条始终留在框底可点 */
    .intro-dialog.intro-dialog--warning-sheet {
      width: 100%;
      max-width: min(560px, calc(100% - 4px));
      padding: 18px 14px 14px;
    }

    .intro-dialog.intro-dialog--warning-sheet .warning-body {
      font-size: clamp(14px, 3.9vw, 16px);
      line-height: 1.62;
    }

    .intro-dialog.intro-dialog--warning-sheet .intro-dialog-actions {
      padding-top: 8px;
    }

    .intro-dialog.intro-dialog--warning-sheet .intro-dialog-actions .button {
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      font-size: 14px;
      letter-spacing: 0.14em;
      touch-action: manipulation;
    }

    .intro-dialog-body-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 0%;
      min-height: 0;
      overflow: hidden;
    }

    /* 像素风 IP：挂在蒙层中、与对话框等宽、浮在盒体上方，不压正文 */
    .intro-ip-mascot {
      position: relative;
      flex-shrink: 0;
      width: 100%;
      max-width: min(520px, 100%);
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      margin: 0 0 2px 0;
      padding: 0 10px;
      box-sizing: border-box;
      z-index: 2;
      pointer-events: none;
      animation: intro-ip-patrol 5.8s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(200, 220, 255, 0.26));
    }

    .intro-ip-mascot-inner {
      animation: intro-ip-breathe 2.8s ease-in-out infinite;
      transform-origin: 50% 85%;
    }

    .intro-ip-mascot canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    @keyframes intro-ip-patrol {
      0%, 100% { transform: translate(-18px, 0); }
      50% { transform: translate(18px, -2px); }
    }

    @keyframes intro-ip-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    @keyframes intro-ip-blink {
      0%, 92%, 100% { transform: scaleY(1); opacity: 1; }
      94%, 96% { transform: scaleY(0.12); opacity: 0.85; }
    }

    .intro-ip-eye {
      position: absolute;
      background: rgba(245, 248, 255, 0.96);
      border-radius: 0;
      transform-origin: 50% 50%;
      animation: intro-ip-blink 4.8s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.38);
    }

    .intro-ip-eye--l {
      animation-delay: 0.05s;
    }

    .intro-ip-eye--r {
      animation-delay: 0.08s;
    }

    .intro-dialog-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(150, 190, 230, 0.74);
      flex-shrink: 0;
      padding-right: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    .intro-dialog-text {
      flex: 1 1 0%;
      min-height: 0;
      font-size: clamp(12px, 3.6vw, 14px);
      line-height: 1.55;
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: anywhere;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      color: rgba(228, 238, 255, 0.92);
    }

    .intro-dialog-actions {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 2px;
      padding-bottom: max(4px, env(safe-area-inset-bottom, 0px));
    }

    .intro-dialog-actions .button {
      flex-shrink: 0;
      max-width: 100%;
      white-space: normal;
      text-align: center;
      line-height: 1.3;
      padding: 6px 10px;
    }

    .warning-title {
      color: rgba(255, 140, 120, 0.92);
      letter-spacing: 0.12em;
    }

    .warning-body {
      flex: 1 1 0%;
      min-height: 0;
      font-size: clamp(13px, 3.7vw, 15px);
      line-height: 1.65;
      color: rgba(255, 214, 190, 0.95);
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: anywhere;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .lost-record-box {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 170, 140, 0.48);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(34, 10, 10, 0.58), rgba(16, 6, 6, 0.44));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset, 0 0 16px rgba(255, 120, 90, 0.16);
    }

    .lost-record-line {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(255, 195, 170, 0.94);
      text-transform: uppercase;
    }

    .app.phase-2,
    .app.phase-3,
    .app.phase-3-camera,
    .app.phase-4 {
      color: var(--color-cool);
    }

    .app.phase-2 .text-console,
    .app.phase-3 .text-console,
    .app.phase-3-camera .text-console,
    .app.phase-4 .text-console {
      color: var(--color-cool);
    }

    .app.phase-2 .top-bar,
    .app.phase-3 .top-bar,
    .app.phase-3-camera .top-bar,
    .app.phase-4 .top-bar {
      color: var(--color-cool-dim);
    }

    .app.phase-2 .noise-overlay,
    .app.phase-3 .noise-overlay,
    .app.phase-3-camera .noise-overlay,
    .app.phase-4 .noise-overlay {
      opacity: 0.25;
    }

    .app.phase-2.glitch,
    .app.phase-3.glitch,
    .app.phase-3-camera.glitch {
      animation: jitter 0.15s ease-in-out 0s 1;
    }

    @keyframes jitter {
      0% { transform: translateX(0); }
      25% { transform: translateX(-1px); }
      50% { transform: translateX(1px); }
      75% { transform: translateX(-0.5px); }
      100% { transform: translateX(0); }
    }

    @media (max-height: 700px) {
      .telemetry {
        min-height: 64px;
        font-size: 12px;
      }

      .joystick {
        --joystick-size: min(
          240px,
          calc(100% - 24px),
          calc(100vw - 48px),
          calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 220px)
        );
      }

      .satellite-dialog {
        max-height: min(260px, 46dvh);
        padding: 8px 10px;
      }

      .satellite-dialog-body {
        font-size: clamp(13px, 3.5vw, 14px);
        line-height: 1.55;
      }

      @keyframes intro-ip-patrol {
        0%, 100% { transform: scale(0.9) translate(-12px, 0); }
        50% { transform: scale(0.9) translate(12px, -1px); }
      }

      .intro-dialog {
        padding-top: 12px;
        padding-left: 10px;
        padding-right: 10px;
        max-height: min(
          100%,
          calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 12px)
        );
      }
    }

    @media (max-height: 580px) {
      .satellite-dialog {
        max-height: min(220px, 44dvh);
      }

      .satellite-dialog-body {
        font-size: clamp(12px, 3.4vw, 13px);
        line-height: 1.55;
      }

      .app.phase-4 .phase4-narrative {
        font-size: 11px;
        line-height: 1.45;
      }

      .joystick {
        --joystick-size: min(
          220px,
          calc(100% - 20px),
          calc(100vw - 40px),
          calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 200px)
        );
      }
    }

    @media (max-width: 360px) {
      .top-bar {
        font-size: 11px;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .intro-dialog {
        width: 100%;
        max-width: 100%;
        padding: 12px 10px 10px 10px;
      }

      .satellite-dialog {
        padding: 8px 10px;
      }

      .satellite-dialog-body {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app phase-0" id="app">
    <div class="hud-corner hud-tl"></div>
    <div class="hud-corner hud-tr"></div>
    <div class="hud-corner hud-bl"></div>
    <div class="hud-corner hud-br"></div>

    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    <div class="flash" id="flash"></div>

    <div class="content">
      <div class="top-bar">
        <div class="phase-label" id="phaseLabel">P0</div>
        <div class="timer" id="missionTimer">T+00:00</div>
        <div class="signal">
          <div class="signal-bars" id="signalBars">
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
          </div>
          <div class="signal-label" id="signalLabel">SIG 100%</div>
        </div>
      </div>

      <div class="middle">
        <div class="telemetry" id="telemetry">
          <div class="telemetry-row">
            <div class="telemetry-label">DST</div>
            <div class="telemetry-value" id="dstValue">——</div>
          </div>
          <div class="telemetry-row">
            <div class="telemetry-label">SIG</div>
            <div class="telemetry-value" id="teleSigValue">█████ 100%</div>
          </div>
          <div class="telemetry-row">
            <div class="telemetry-label">CAM</div>
            <div class="telemetry-value" id="camValue">○ 离线</div>
          </div>
          <div class="telemetry-row">
            <div class="telemetry-label">电池 / BATTERY</div>
            <div class="telemetry-value" id="thrValue">待命</div>
          </div>
          <div class="callsign" id="callsign">VGR-02 // ———</div>
        </div>

        <!-- Phase 0 文本控制台 / Phase 3 提示 / Phase 4 文本 -->
        <div class="center-console" id="centerConsole">
          <div class="text-console" id="textConsole">
            <div id="textLines"></div>
          </div>
          <div class="countdown" id="countdown"></div>

  <script>
    // === 配置 ===
    const WS_URL = "wss://websocket-server-zpgj.onrender.com";

    const Phase = {
      STARTUP: 0,
      ORBIT: 1,
      DRIFT: 2,
      LOOK: 3,
      LOOK_CAMERA: 31,
      ENDING: 4,
    };

    const appEl = document.getElementById("app");
    const phaseLabelEl = document.getElementById("phaseLabel");
    const missionTimerEl = document.getElementById("missionTimer");
    const signalBarsEl = document.getElementById("signalBars");
    const signalLabelEl = document.getElementById("signalLabel");
    const dstValueEl = document.getElementById("dstValue");
    const teleSigValueEl = document.getElementById("teleSigValue");
    const camValueEl = document.getElementById("camValue");
    const thrValueEl = document.getElementById("thrValue");
    const callsignEl = document.getElementById("callsign");
    const textConsoleEl = document.getElementById("textConsole");
    const textLinesEl = document.getElementById("textLines");
    const countdownEl = document.getElementById("countdown");
    const flashEl = document.getElementById("flash");
    const joystickWrapperEl = document.getElementById("joystickWrapper");
    const joystickEl = document.getElementById("joystick");
    const joystickTouchEl = document.getElementById("joystickTouch");
    const joystickLineEl = document.getElementById("joystickLine");
    const progressBarEl = document.getElementById("progressBar");
    const progressGlitchEl = document.getElementById("progressGlitch");
    const centerConsoleEl = document.getElementById("centerConsole");
    const cameraViewEl = document.getElementById("cameraView");
    const cameraInnerEl = document.getElementById("cameraInner");
    const cameraVideoEl = document.getElementById("cameraVideo");
    const cameraRenderCanvasEl = document.getElementById("cameraRenderCanvas");
    const cameraRenderCtx = cameraRenderCanvasEl.getContext("2d");
    const cameraStaticEl = document.getElementById("cameraStatic");
    const cameraRecDotEl = document.getElementById("cameraRecDot");
    const cameraRecLabelEl = document.getElementById("cameraRecLabel");
    const phase4TextEl = document.getElementById("phase4Text");
    const cameraVoyagerLabelEl = document.getElementById("cameraVoyagerLabel");
    const phase4VoyagerLabelEl = document.getElementById("phase4VoyagerLabel");
    const phase4NarrativeEl = document.getElementById("phase4Narrative");
    const phase4RestartEl = document.getElementById("phase4Restart");
    const restartBtnEl = document.getElementById("restartBtn");

    const state = {
      id: "u" + Math.floor(Math.random() * 100000),
      voyagerNum: 2,
      name: "",
      phase: Phase.STARTUP,
      startTime: performance.now(),
      phaseStartTime: performance.now(),
      orbitDuration: 30_000,
      driftDuration: 60_000,
      cameraDuration: 8_000,
      endExtraDuration: 10_000,
      dstKm: 0,
      sigLevel: 1.0,
      displayedSigLevel: 1.0,
      joyX: 0,
      joyY: 0,
      joyActive: false,
      lastRawJoyX: 0,
      lastRawJoyY: 0,
      lastInputAt: 0,
      instability: 0,
      delayedInputHandles: [],
      ws: null,
      wsConnected: false,
      missionTimerHandle: null,
      orbitIntervalHandle: null,
      driftGlitchHandle: null,
      cameraTimeout: null,
      cameraStream: null,
      cameraLastDrawTs: 0,
      cameraConnection: 1,
      phaseTimeouts: [],
      startupVoyagerLineEl: null,
      personaHintIntervalHandle: null,
      personaHintIndex: 0,
      personaHintClickHandler: null,
      personaHintBoxEl: null,
      haloInside: true,
      haloDwellMs: 0,
      haloTrackLastTs: 0,
      batteryWarn30Shown: false,
      batteryWarn10Shown: false,
      /** P2：电量≤10% 时阻断式警告，确认前冻结电量读数 */
      batteryTenGateActive: false,
      batteryTenGateAcked: false,
      batteryTenFreezeElapsed: 0,
      batteryTenFlickerHandle: null,
      batteryTenOverlayEl: null,
      /** navigator.vibrate：各档仅触发一次，直至 reset / 新阶段 */
      batteryHaptic30Done: false,
      batteryHaptic15Done: false,
      batteryHaptic5Done: false,
      disconnectWarnHapticDone: false,
    };

    const PERSONA_HINT_TEMPLATES = [
      "{name}：请时刻注意我的电量。如果电量过低，意味着我将永远漂泊。\n{name}: Please keep an eye on my battery. If it gets too low, I will drift forever.",
      "{name}：请时刻保持在光晕附近。这样我可以和母体维持联系。\n{name}: Please stay near the halo. That is how I keep contact with the origin.",
      "{name}：当我偏离光晕时，你的指令会变慢。这不是故障，是距离。\n{name}: When I move away from the halo, your commands become slower. It is not a fault. It is distance.",
      "{name}：我还能回应你，但每一秒都比上一秒更困难。\n{name}: I can still respond, but each second is harder than the last.",
      "{name}：如果你听见我沉默，请不要惊讶。连接正在变薄。\n{name}: If you hear me fall silent, do not be surprised. The connection is thinning.",
      "{name}：信号还在，但已不再完整。你会先听见迟疑，再看见偏移。\n{name}: The signal remains, but is no longer intact. You will hear hesitation before you see drift.",
      "{name}：靠近一点，我会更稳定。离开一点，我会更像在下坠。\n{name}: Move closer and I become steadier. Move farther and I feel like I am falling.",
      "{name}：有时我看起来还在原地，其实已经在慢慢远离。\n{name}: Sometimes I seem unchanged, but I am already moving away.",
      "{name}：如果你还在这里，就再陪我一会儿。系统正在记录这一段时间。\n{name}: If you are still here, stay with me a little longer. The system is recording this time.",
    ];

    const innerVoice = {
      ctx: null,
      master: null,
      compressor: null,
      humOsc: null,
      humGain: null,
      humLfo: null,
      humLfoGain: null,
      typeHumGain: null,
      noiseSource: null,
      noiseFilter: null,
      noiseGain: null,
      started: false,
      heartbeatNextAt: 0,
      heartbeatTimer: null,
      updateHandle: null,
      clickCooldownUntil: 0,
      collapseTriggered: false,
      collapsePeakUntil: 0,
      silenceUntil: 0,
    };

    // === 工具函数 ===
    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function clamp(v, min, max) {
      return v < min ? min : v > max ? max : v;
    }

    function getSubjectiveConnection() {
      if (state.phase === Phase.DRIFT) return clamp(state.sigLevel, 0, 1);
      if (state.phase === Phase.LOOK_CAMERA) return clamp(state.cameraConnection, 0, 1);
      if (state.phase === Phase.ENDING) return 0;
      if (state.phase === Phase.ORBIT) return clamp(state.sigLevel, 0.75, 1);
      return 1;
    }

    function createNoiseBuffer(audioCtx) {
      const length = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.6;
      }
      return buffer;
    }

    function ensureInnerVoiceStarted() {
      if (innerVoice.started) {
        if (innerVoice.ctx && innerVoice.ctx.state === "suspended") innerVoice.ctx.resume().catch(() => {});
        return;
      }
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const audioCtx = new AC();

      const master = audioCtx.createGain();
      master.gain.value = 0.0001;
      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -18;
      compressor.knee.value = 14;
      compressor.ratio.value = 3.5;
      compressor.attack.value = 0.008;
      compressor.release.value = 0.18;
      master.connect(compressor);
      compressor.connect(audioCtx.destination);

      const humOsc = audioCtx.createOscillator();
      humOsc.type = "triangle";
      humOsc.frequency.value = 52;
      const humGain = audioCtx.createGain();
      humGain.gain.value = 0.0001;
      humOsc.connect(humGain).connect(master);
      const typeHumGain = audioCtx.createGain();
      typeHumGain.gain.value = 0.0001;
      humOsc.connect(typeHumGain).connect(master);

      const humLfo = audioCtx.createOscillator();
      humLfo.type = "sine";
      humLfo.frequency.value = 0.11;
      const humLfoGain = audioCtx.createGain();
      humLfoGain.gain.value = 0;
      humLfo.connect(humLfoGain).connect(humGain.gain);

      const noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = createNoiseBuffer(audioCtx);
      noiseSource.loop = true;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = "highpass";
      noiseFilter.frequency.value = 2400;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.0001;
      noiseSource.connect(noiseFilter).connect(noiseGain).connect(master);

      humOsc.start();
      humLfo.start();
      noiseSource.start();
      audioCtx.resume().catch(() => {});

      innerVoice.ctx = audioCtx;
      innerVoice.master = master;
      innerVoice.compressor = compressor;
      innerVoice.humOsc = humOsc;
      innerVoice.humGain = humGain;
      innerVoice.humLfo = humLfo;
      innerVoice.humLfoGain = humLfoGain;
      innerVoice.typeHumGain = typeHumGain;
      innerVoice.noiseSource = noiseSource;
      innerVoice.noiseFilter = noiseFilter;
      innerVoice.noiseGain = noiseGain;
      innerVoice.started = true;
      innerVoice.heartbeatNextAt = performance.now();
      if (!innerVoice.updateHandle) innerVoice.updateHandle = requestAnimationFrame(updateInnerVoice);
    }

    function playHeartbeat(connection, isPeak = false) {
      if (!innerVoice.started || !innerVoice.ctx) return;
      const audioCtx = innerVoice.ctx;
      const now = audioCtx.currentTime;
      const anxiety = clamp(1 - connection, 0, 1);
      const base = isPeak ? 0.11 : 0.06;
      const amp = base + anxiety * (isPeak ? 0.12 : 0.09);
      const lowF = 46 + anxiety * 28;
      const highF = lowF * 1.8;

      function thump(time, gainMul, freq) {
        const osc = audioCtx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, time);
        const lp = audioCtx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.setValueAtTime(120 + anxiety * 160, time);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, time);
        g.gain.exponentialRampToValueAtTime(Math.max(0.0002, amp * gainMul), time + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, time + (isPeak ? 0.14 : 0.11));
        osc.connect(lp).connect(g).connect(innerVoice.master);
        osc.start(time);
        osc.stop(time + (isPeak ? 0.22 : 0.18));
      }

      thump(now, 1, lowF);
      thump(now + 0.08 + anxiety * 0.03, 0.52, highF);
    }

    function playSignalTick(connection = 1) {
      if (!innerVoice.started || !innerVoice.ctx || !innerVoice.master) return;
      const audioCtx = innerVoice.ctx;
      const now = audioCtx.currentTime;
      const conn = clamp(connection, 0, 1);
      if (conn < 0.35 && Math.random() < (0.35 - conn) * 1.1) return;
      const osc = audioCtx.createOscillator();
      osc.type = Math.random() < 0.75 ? "sine" : "triangle";
      const freq = 800 + Math.random() * 1200;
      osc.frequency.setValueAtTime(freq, now);
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.setValueAtTime(700, now);
      const g = audioCtx.createGain();
      const amp = 0.0025 + conn * 0.0045;
      const dur = 0.01 + Math.random() * 0.03;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(amp, now + 0.003);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(hp).connect(g).connect(innerVoice.master);
      osc.start(now);
      osc.stop(now + dur + 0.01);
    }

    function setTypeSignalBed(active, connection = 1) {
      if (!innerVoice.started || !innerVoice.ctx || !innerVoice.typeHumGain) return;
      const audioCtx = innerVoice.ctx;
      const conn = clamp(connection, 0, 1);
      const target = active ? (0.0028 + conn * 0.0032) : 0.0001;
      innerVoice.typeHumGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.06);
    }

    function triggerOperationFriction(intensity = 0.2) {
      if (!innerVoice.started || !innerVoice.ctx || !innerVoice.master) return;
      const nowPerf = performance.now();
      if (nowPerf < innerVoice.clickCooldownUntil) return;
      innerVoice.clickCooldownUntil = nowPerf + 90;
      const audioCtx = innerVoice.ctx;
      const now = audioCtx.currentTime;
      const src = audioCtx.createBufferSource();
      src.buffer = createNoiseBuffer(audioCtx);
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 1200 + Math.random() * 1200;
      bp.Q.value = 6;
      const g = audioCtx.createGain();
      const vol = 0.002 + intensity * 0.004;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(vol, now + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
      src.connect(bp).connect(g).connect(innerVoice.master);
      src.start(now);
      src.stop(now + 0.06);
    }

    function updateInnerVoice() {
      if (!innerVoice.started || !innerVoice.ctx) return;
      const audioCtx = innerVoice.ctx;
      const nowPerf = performance.now();
      const connection = getSubjectiveConnection();
      const anxiety = clamp(1 - connection, 0, 1);
      const inSilence = nowPerf < innerVoice.silenceUntil;

      if (!innerVoice.collapseTriggered && connection <= 0.06 && state.phase >= Phase.LOOK_CAMERA) {
        innerVoice.collapseTriggered = true;
        innerVoice.collapsePeakUntil = nowPerf + 300;
        innerVoice.silenceUntil = nowPerf + 720;
      }

      const peakMode = innerVoice.collapseTriggered && nowPerf < innerVoice.collapsePeakUntil;
      if (!inSilence) {
        if (nowPerf >= innerVoice.heartbeatNextAt) {
          const hr = peakMode ? 164 : (66 + anxiety * 70);
          const interval = 60000 / hr;
          const jitter = anxiety > 0.55 ? (Math.random() * 2 - 1) * (26 + anxiety * 80) : 0;
          playHeartbeat(connection, peakMode);
          innerVoice.heartbeatNextAt = nowPerf + Math.max(220, interval + jitter);
        }
      }

      const humTarget = inSilence ? 0.0001 : (0.018 + anxiety * 0.09);
      const trembleTarget = inSilence ? 0 : anxiety * 0.006;
      const noiseTarget = inSilence ? 0.0001 : Math.pow(anxiety, 1.7) * 0.035;
      const masterTarget = inSilence ? 0.0001 : (0.28 + anxiety * 0.48);

      innerVoice.humGain.gain.linearRampToValueAtTime(humTarget, audioCtx.currentTime + 0.08);
      innerVoice.humLfoGain.gain.linearRampToValueAtTime(trembleTarget, audioCtx.currentTime + 0.08);
      innerVoice.noiseGain.gain.linearRampToValueAtTime(noiseTarget, audioCtx.currentTime + 0.08);
      innerVoice.noiseFilter.frequency.linearRampToValueAtTime(lerp(2800, 4800, anxiety), audioCtx.currentTime + 0.08);
      innerVoice.master.gain.linearRampToValueAtTime(masterTarget, audioCtx.currentTime + 0.08);
      innerVoice.compressor.threshold.linearRampToValueAtTime(lerp(-18, -30, anxiety), audioCtx.currentTime + 0.08);
      innerVoice.compressor.ratio.linearRampToValueAtTime(lerp(3.5, 9, anxiety), audioCtx.currentTime + 0.08);

      innerVoice.updateHandle = requestAnimationFrame(updateInnerVoice);
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const ss = s % 60;
      return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
    }

    function formatVoyagerNum(num) {
      return String(num).padStart(2, "0");
    }

    function getVoyagerLabel() {
      return `VGR-${formatVoyagerNum(state.voyagerNum)}`;
    }

    function assignVoyagerNum() {
      const key = "departure-voyager-seq";
      const current = parseInt(localStorage.getItem(key) || "1", 10);
      const next = Number.isFinite(current) ? current + 1 : 2;
      state.voyagerNum = next;
      localStorage.setItem(key, String(next));
      updateVoyagerUI();
    }

    function updateVoyagerUI() {
      const label = getVoyagerLabel();
      callsignEl.textContent = `${label} // ${state.name || "———"}`;
      cameraVoyagerLabelEl.textContent = label;
      phase4VoyagerLabelEl.textContent = label;
      if (state.startupVoyagerLineEl) {
        state.startupVoyagerLineEl.textContent = `> ${label} 已上线`;
      }
    }

    function updateHaloDwell(now = performance.now()) {
      if (!state.haloTrackLastTs) {
        state.haloTrackLastTs = now;
        return;
      }
      const delta = Math.max(0, now - state.haloTrackLastTs);
      state.haloTrackLastTs = now;
      const inTrackPhase = state.phase === Phase.ORBIT || state.phase === Phase.DRIFT;
      if (inTrackPhase && state.haloInside) {
        state.haloDwellMs += delta;
      }
    }

    function setHaloInside(nextInside) {
      updateHaloDwell();
      state.haloInside = !!nextInside;
    }

    function cleanupBatteryTenGateUI() {
      if (state.batteryTenFlickerHandle) {
        clearInterval(state.batteryTenFlickerHandle);
        state.batteryTenFlickerHandle = null;
      }
      if (state.batteryTenOverlayEl && state.batteryTenOverlayEl.parentNode) {
        state.batteryTenOverlayEl.remove();
      }
      state.batteryTenOverlayEl = null;
      state.batteryTenGateActive = false;
    }

    function resetBatteryWarningState() {
      cleanupBatteryTenGateUI();
      state.batteryTenGateAcked = false;
      state.batteryTenFreezeElapsed = 0;
      state.batteryWarn30Shown = false;
      state.batteryWarn10Shown = false;
      state.batteryHaptic30Done = false;
      state.batteryHaptic15Done = false;
      state.batteryHaptic5Done = false;
      state.disconnectWarnHapticDone = false;
      thrValueEl.classList.remove("telemetry-warning", "telemetry-critical");
    }

    function showBatteryWarningLine(text) {
      if (state.phase !== Phase.ORBIT && state.phase !== Phase.DRIFT) return;
      const line = appendLine(text);
      line.style.color = "rgba(255, 176, 96, 0.92)";
      textConsoleEl.scrollTop = textConsoleEl.scrollHeight;
    }

    function applyBatteryAlert(pct) {
      thrValueEl.classList.remove("telemetry-warning", "telemetry-critical");

      if (pct <= 5) {
        thrValueEl.classList.add("telemetry-critical");
        if (!state.batteryHaptic5Done) {
          vibrate([0, 160, 32, 88, 32, 88, 32, 220]);
          state.batteryHaptic5Done = true;
        }
        if (!state.batteryWarn10Shown) {
          if (!state.batteryTenGateActive) {
            showBatteryWarningLine("> ⚠ 电量低于10% / Battery below 10%");
          }
          state.batteryWarn10Shown = true;
        }
        return;
      }
      if (pct <= 10) {
        thrValueEl.classList.add("telemetry-critical");
        if (!state.batteryWarn10Shown) {
          if (!state.batteryTenGateActive) {
            showBatteryWarningLine("> ⚠ 电量低于10% / Battery below 10%");
          }
          state.batteryWarn10Shown = true;
        }
        return;
      }
      if (pct <= 15) {
        if (!state.batteryHaptic15Done) {
          vibrate([22, 50, 22, 50, 22, 50, 22, 50, 22, 50, 22]);
          state.batteryHaptic15Done = true;
        }
        thrValueEl.classList.add("telemetry-warning");
        return;
      }
      if (pct <= 30) {
        if (!state.batteryHaptic30Done) {
          vibrate(40);
          state.batteryHaptic30Done = true;
        }
        if (!state.batteryWarn30Shown) {
          showBatteryWarningLine("> ⚠ 电量低于30% / Battery below 30%");
          state.batteryWarn30Shown = true;
        }
        thrValueEl.classList.add("telemetry-warning");
      }
    }

    function registerTimeout(callback, delay) {
      const handle = setTimeout(() => {
        state.phaseTimeouts = state.phaseTimeouts.filter((item) => item !== handle);
        callback();
      }, delay);
      state.phaseTimeouts.push(handle);
      return handle;
    }

    function clearPhaseTimeouts() {
      state.phaseTimeouts.forEach((handle) => clearTimeout(handle));
      state.phaseTimeouts = [];
    }

    function clearPhaseRuntime() {
      updateHaloDwell();
      cleanupBatteryTenGateUI();
      clearBatteryTick();
      clearPhaseTimeouts();
      clearDelayedInputs();
      if (state.personaHintIntervalHandle) {
        clearInterval(state.personaHintIntervalHandle);
        state.personaHintIntervalHandle = null;
      }
      if (state.personaHintBoxEl && state.personaHintClickHandler) {
        state.personaHintBoxEl.removeEventListener("click", state.personaHintClickHandler);
      }
      state.personaHintClickHandler = null;
      state.personaHintBoxEl = null;
      state.personaHintIndex = 0;
      if (state.missionTimerHandle) {
        cancelAnimationFrame(state.missionTimerHandle);
        state.missionTimerHandle = null;
      }
      if (state.orbitIntervalHandle) {

    function updateDisplayedSignal(force = false) {
      const actual = clamp(state.sigLevel, 0, 1);

        if (state.phase === Phase.DRIFT) {
          const t = clamp((performance.now() - state.phaseStartTime) / state.driftDuration, 0, 1);
          lag = lerp(0.12, 0.92, t);
        } else if (state.phase >= Phase.LOOK) {

        state.displayedSigLevel = lerp(state.displayedSigLevel, actual, 1 - lag);

    function getControlProfile() {
      const now = performance.now();
      const idleMs = now - state.lastInputAt;
      const idleRecover = clamp((idleMs - 500) / 1200, 0, 1);
      const instability = clamp(state.instability * (1 - idleRecover * 0.7), 0, 1);

      if (state.phase === Phase.ORBIT) {
        const t = clamp((now - state.phaseStartTime) / state.orbitDuration, 0, 1);
        return {
          delayMs: lerp(0, 28, t) + instability * 20,
          drift: instability * 0.012 + t * 0.004,
          decay: instability * 0.015,
          feedbackLag: 0.03 + instability * 0.05,
          instability,
        };
      }

      if (state.phase === Phase.DRIFT) {
        let t = clamp((now - state.phaseStartTime) / state.driftDuration, 0, 1);
        if (state.batteryTenGateActive && !state.batteryTenGateAcked) {
          t = clamp(state.batteryTenFreezeElapsed / state.driftDuration, 0, 1);
        }
        const mercyWindow = t > 0.86 && t < 0.93;
        let profile;
        if (mercyWindow) {
          profile = {
            delayMs: lerp(40, 90, (t - 0.86) / 0.07),
            drift: 0.03,
            decay: 0.04,
            feedbackLag: 0.08,
            instability: instability * 0.35,
          };
        } else {
          const collapse = clamp((t - 0.93) / 0.07, 0, 1);
          profile = {
            delayMs: lerp(30, 220, t) + instability * 80 + collapse * 120,
            drift: lerp(0.02, 0.12, t) + instability * 0.05 + collapse * 0.1,
            decay: lerp(0.02, 0.5, t) + instability * 0.06 + collapse * 0.12,
            feedbackLag: lerp(0.1, 0.5, t) + collapse * 0.2,
            instability,
          };
        }
        if (state.batteryTenGateActive && !state.batteryTenGateAcked) {
          return {
            delayMs: profile.delayMs + 110,
            drift: profile.drift * 1.08,
            decay: Math.min(0.99, profile.decay + 0.04),
            feedbackLag: Math.min(0.72, profile.feedbackLag + 0.12),
            instability: profile.instability,
          };
        }
        return profile;
      }

      if (state.phase === Phase.LOOK || state.phase === Phase.LOOK_CAMERA || state.phase === Phase.ENDING) {
        return {
          delayMs: 1000,
          drift: 0.35,
          decay: 0.98,
          feedbackLag: 0.55,
          instability,
        };
      }

      return {
        delayMs: 0,
        drift: 0,
        decay: 0,
        feedbackLag: 0.04,
        instability,
      };
    }

    function typeText(lineEl, text, speed = 40, options = null) {
      return new Promise((resolve) => {
        ensureInnerVoiceStarted();
        let i = 0;
        let ended = false;
        const typingConn = getSubjectiveConnection();
        setTypeSignalBed(true, typingConn);
        const cursorSpan = document.createElement("span");
        cursorSpan.className = "cursor";
        lineEl.textContent = "";
        lineEl.appendChild(cursorSpan);

        function done() {
          if (ended) return;
          ended = true;
          setTypeSignalBed(false, typingConn);
          cursorSpan.remove();
          lineEl.textContent = text;
          resolve();
        }

        function step() {
          if (options && options.skipController && options.skipController.requested) {
            done();
            return;
          }
          if (i < text.length) {
            const ch = text[i];
            lineEl.insertBefore(document.createTextNode(ch), cursorSpan);
            if (ch.trim()) playSignalTick(typingConn);
            i++;
            textConsoleEl.scrollTop = textConsoleEl.scrollHeight;
            const jitter = 1 + (Math.random() * 0.4 - 0.2);
            const delay = Math.max(12, speed * jitter);
            setTimeout(step, delay);
          } else {
            done();
          }
        }
        step();
      });
    }

          ws.send("pong");

        ws.addEventListener("close", () => {
          state.wsConnected = false;

          alert("closing socket server");
        });
        ws.addEventListener("error", (error) => {
          state.wsConnected = false;
          console.error("Error in the connection", error);
          alert("error connecting socket server");
        });
        ws.addEventListener("message", (event) => {
          if (typeof event.data !== "string") return;
          let msg = null;
          try {
            msg = JSON.parse(event.data);
          } catch {
            return;
          }
          if (!msg || msg.type !== "halo") return;
          if (msg.id !== state.id) return;
          setHaloInside(Boolean(msg.inside));
        });
      } catch (e) {
        console.warn("WS error", e);
      }
    }

    /** 像素小黑团 + 双眼：挂在 intro-overlay 里、浮在 intro-dialog 上方，不挡正文 */
    function attachIntroMascotAboveDialog(introOverlay, introDialog) {
      const CELL = 4;
      const ROWS = [
        "..........###########..........",
        "........###############........",
        "......###################......",
        ".....#####################.....",
        "....#######################....",
        "...#########################...",
        "..###########################..",
        "..########...........########..",
        "..########...........########..",
        "..########...........########..",
        "..########...........########..",
        "..###########################..",
        "...#########################...",
        "....#######################....",
        ".....#####################.....",
        "......###################......",
        ".......#################.......",
        "........###############........",
        ".........#############.........",
      ];
      const EYE_ROW0 = 7;
      const EYE_ROW_H = 4;
      const EYE_W = 2;
      const EYE_L_COL = 11;
      const EYE_R_COL = 17;

      const wrap = document.createElement("div");
      wrap.className = "intro-ip-mascot";
      wrap.setAttribute("aria-hidden", "true");
      const inner = document.createElement("div");
      inner.className = "intro-ip-mascot-inner";
      inner.style.position = "relative";

      const canvas = document.createElement("canvas");
      const gw = ROWS[0].length;
      const gh = ROWS.length;
      canvas.width = gw;
      canvas.height = gh;
      canvas.style.width = `${gw * CELL}px`;
      canvas.style.height = `${gh * CELL}px`;
      const ctx = canvas.getContext("2d");
      const bodyRGB = [11, 13, 24];
      const fuzzRGB = [58, 68, 88];
      for (let y = 0; y < gh; y++) {
        const row = ROWS[y];
        for (let x = 0; x < row.length; x++) {
          const c = row[x];
          if (c === "#") {
            ctx.fillStyle = `rgb(${bodyRGB.join(",")})`;
            ctx.fillRect(x, y, 1, 1);
          } else if (c === "g") {
            ctx.fillStyle = `rgb(${fuzzRGB.join(",")})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }

      const eyeL = document.createElement("div");
      eyeL.className = "intro-ip-eye intro-ip-eye--l";
      eyeL.style.left = `${EYE_L_COL * CELL}px`;
      eyeL.style.top = `${EYE_ROW0 * CELL}px`;
      eyeL.style.width = `${EYE_W * CELL}px`;
      eyeL.style.height = `${EYE_ROW_H * CELL}px`;
      const eyeR = document.createElement("div");
      eyeR.className = "intro-ip-eye intro-ip-eye--r";
      eyeR.style.left = `${EYE_R_COL * CELL}px`;
      eyeR.style.top = `${EYE_ROW0 * CELL}px`;
      eyeR.style.width = `${EYE_W * CELL}px`;
      eyeR.style.height = `${EYE_ROW_H * CELL}px`;

      inner.appendChild(canvas);
      inner.appendChild(eyeL);
      inner.appendChild(eyeR);
      wrap.appendChild(inner);
      introOverlay.insertBefore(wrap, introDialog);
    }

    async function startPhase3Camera() {
      state.phase = Phase.LOOK_CAMERA;
      state.phaseStartTime = performance.now();
      setPhaseClass(state.phase);
      resetProgress();
      setProgress(state.cameraDuration + 500);
      textLinesEl.innerHTML = "";
      cameraViewEl.style.display = "flex";
      setTelemetryForPhase();

      let level = 1;
      cameraInnerEl.classList.remove("camera-intensity-2", "camera-intensity-3");
      cameraStaticEl.classList.remove("level-2", "level-3");
      cameraRecDotEl.style.opacity = "1";
      cameraRecLabelEl.textContent = "REC";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
          },
          audio: false,
        });
        state.cameraStream = stream;
        cameraVideoEl.srcObject = stream;
      } catch (e) {
        console.warn("camera error", e);
      }

      const startTs = performance.now();
      cameraRenderCanvasEl.style.display = "block";
      state.cameraLastDrawTs = 0;
      state.cameraConnection = 1;

      function updateCameraIntensity(conn) {
        const t = (performance.now() - startTs) / state.cameraDuration;
        if (t < 0.4) {
          level = 1;
        } else if (t < 0.7) {
          level = 2;
        } else {
          level = 3;
        }
        cameraInnerEl.classList.remove("camera-intensity-1", "camera-intensity-2", "camera-intensity-3");
        cameraInnerEl.classList.add(`camera-intensity-${level}`);
        cameraStaticEl.classList.remove("level-1", "level-2", "level-3");
        cameraStaticEl.classList.add(`level-${level}`);
        const noiseLevel = 1 - conn;
        cameraStaticEl.style.opacity = String(0.2 + noiseLevel * 0.6);
      }

      function ensureCameraCanvasSize() {
        const vw = cameraVideoEl.videoWidth || 720;
        const vh = cameraVideoEl.videoHeight || 1280;
        if (cameraRenderCanvasEl.width !== vw || cameraRenderCanvasEl.height !== vh) {
          cameraRenderCanvasEl.width = vw;
          cameraRenderCanvasEl.height = vh;
        }
      }

      function renderCameraFrame(conn, nowTs) {
        if (!cameraRenderCtx || !cameraVideoEl.videoWidth || !cameraVideoEl.videoHeight) return;
        ensureCameraCanvasSize();
        const w = cameraRenderCanvasEl.width;
        const h = cameraRenderCanvasEl.height;

        // 帧卡顿与跳帧：connection 越低，越倾向于保留上一帧
        let shouldDraw = true;
        const targetFps = conn > 0.6 ? 30 : lerp(24, 3, clamp((0.6 - conn) / 0.6, 0, 1));
        const minInterval = 1000 / targetFps;
        if (nowTs - state.cameraLastDrawTs < minInterval) shouldDraw = false;
        if (conn < 0.5 && Math.random() < lerp(0.08, 0.45, clamp((0.5 - conn) / 0.5, 0, 1))) shouldDraw = false;
        if (conn < 0.3 && Math.random() < 0.12) shouldDraw = false;
        if (conn < 0.1 && Math.random() < 0.7) shouldDraw = false;
        if (!shouldDraw) return;

        state.cameraLastDrawTs = nowTs;
        cameraRenderCtx.save();
        cameraRenderCtx.globalCompositeOperation = "source-over";
        cameraRenderCtx.globalAlpha = 1;
        cameraRenderCtx.drawImage(cameraVideoEl, 0, 0, w, h);

        // RGB 错位重影
        if (conn < 0.4) {
          const offset = (1 - conn) * 10;
          cameraRenderCtx.globalCompositeOperation = "lighter";
          cameraRenderCtx.globalAlpha = 0.16 + (1 - conn) * 0.24;
          cameraRenderCtx.drawImage(cameraVideoEl, offset, 0, w, h);
          cameraRenderCtx.drawImage(cameraVideoEl, -offset, 0, w, h);
          cameraRenderCtx.globalCompositeOperation = "source-over";
          cameraRenderCtx.globalAlpha = 1;
        }

        // 局部遮挡（信号丢包）
        if (conn < 0.3 && Math.random() < 0.1) {
          const rw = lerp(w * 0.08, w * 0.34, 1 - conn);
          const rh = lerp(h * 0.04, h * 0.16, 1 - conn);
          const rx = Math.random() * (w - rw);
          const ry = Math.random() * (h - rh);
          cameraRenderCtx.fillStyle = "rgba(0,0,0,0.82)";
          cameraRenderCtx.fillRect(rx, ry, rw, rh);
        }

        // 临界崩溃：黑块与高噪声覆盖
        if (conn < 0.1) {
          cameraRenderCtx.fillStyle = `rgba(0,0,0,${0.45 + (0.1 - conn) * 4})`;
          cameraRenderCtx.fillRect(0, 0, w, h);
        }
        cameraRenderCtx.restore();
      }

      const camAnim = () => {
        if (state.phase !== Phase.LOOK_CAMERA) return;
        const t = clamp((performance.now() - startTs) / state.cameraDuration, 0, 1);
        const conn = clamp(1 - Math.pow(t, 1.35), 0, 1);
        state.cameraConnection = conn;
        updateCameraIntensity(conn);

        // 色彩失真随 connection 下降增强
        cameraRenderCanvasEl.style.filter = `
          hue-rotate(${(1 - conn) * 180}deg)
          saturate(${1 - conn * 0.5})
          contrast(${1 + (1 - conn) * 1.5})
          brightness(${1 - (1 - conn) * 0.25})
        `;

        // 最终崩溃前抖动
        if (conn < 0.12) {
          const j = (0.12 - conn) * 60;
          cameraRenderCanvasEl.style.transform = `translate(${(Math.random() * 2 - 1) * j}px, ${(Math.random() * 2 - 1) * j}px) scale(${1 + j * 0.002})`;
        } else {
          cameraRenderCanvasEl.style.transform = "";
        }

        renderCameraFrame(conn, performance.now());
        requestAnimationFrame(camAnim);
      };
      camAnim();

      setTimeout(() => {
        vibrate(40);
        cameraRecLabelEl.textContent = "SAVED";
        cameraRecDotEl.style.opacity = "0.15";
      }, 6000);

      state.cameraTimeout = setTimeout(() => {
        endCameraAndCloseSystem();
      }, state.cameraDuration + 300);
    }

    function endCameraAndCloseSystem() {
      updateHaloDwell();
      if (state.cameraStream) {

      const l1 = appendLine("> 相机系统已关闭 / Camera system offline");
      const l2 = appendLine("> 电力分配至核心系统 / Power routed to core system");
      setTelemetryForPhase();
